<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sidang Proposal — Zainal Parhan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0e2038; --navy2:#122a4a; --emerald:#1f6f54; --emerald2:#2c8a6b;
  --gold:#c9a227; --ivory:#f7f8f6; --ink:#12181f; --muted:#5b6b7c;
  --card:#ffffff; --line:#e4e8e6; --display:'Fraunces',serif; --body:'Inter',sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--body); color:var(--ink); background:#000; overflow:hidden;}

/* ---------- View Transition tuning (the "connected" morph feel) ---------- */
::view-transition{ perspective:1900px; }
::view-transition-group(*){ animation-duration:.7s; animation-timing-function:cubic-bezier(.2,.7,.2,1); }
::view-transition-old(mainTitle), ::view-transition-new(mainTitle){ height:100%; }

html.dir-fwd::view-transition-old(root){ animation: flyOutFwd .55s cubic-bezier(.4,0,.7,.2) both; }
html.dir-fwd::view-transition-new(root){ animation: flyInFwd .75s cubic-bezier(.16,.8,.2,1) both; }
html.dir-back::view-transition-old(root){ animation: flyOutBack .55s cubic-bezier(.4,0,.7,.2) both; }
html.dir-back::view-transition-new(root){ animation: flyInBack .75s cubic-bezier(.16,.8,.2,1) both; }
@keyframes flyOutFwd{ to{ transform:translateZ(-560px) rotateY(-14deg) translateX(-50px); opacity:0; } }
@keyframes flyInFwd{ from{ transform:translateZ(600px) rotateY(16deg) translateX(70px); opacity:0;} to{ transform:none; opacity:1;} }
@keyframes flyOutBack{ to{ transform:translateZ(-560px) rotateY(14deg) translateX(50px); opacity:0; } }
@keyframes flyInBack{ from{ transform:translateZ(600px) rotateY(-16deg) translateX(-70px); opacity:0;} to{ transform:none; opacity:1;} }

#netCanvas{ position:fixed; inset:0; z-index:3; pointer-events:none; }

#bgBase{ position:fixed; inset:0; background:var(--ivory); z-index:0; }
#bgBase.is-dark{ background:var(--navy); }
#app{ position:fixed; inset:0; background:transparent; z-index:10; }

/* ambient morphing orbs — same element, persists & drifts across slides */
.orb{ position:fixed; border-radius:50%; filter:blur(4px); pointer-events:none; transition:none; z-index:1; }
#orbA{ view-transition-name: orbA; }
#orbB{ view-transition-name: orbB; }
@keyframes driftA{ 0%,100%{ transform:translate(0,0) rotate(0deg);} 50%{ transform:translate(18px,-24px) rotate(8deg);} }
@keyframes driftB{ 0%,100%{ transform:translate(0,0) rotate(0deg);} 50%{ transform:translate(-20px,22px) rotate(-8deg);} }
#orbA{ animation:driftA 10s ease-in-out infinite; }
#orbB{ animation:driftB 12s ease-in-out infinite; }

/* progress bar */
#progressTrack{ position:fixed; top:0; left:0; right:0; height:4px; background:rgba(120,140,160,.18); z-index:50; }
#progressFill{ height:100%; background:linear-gradient(90deg,var(--emerald),var(--gold)); view-transition-name:progressFill; }

/* topbar */
#topbar{ position:fixed; top:22px; left:64px; right:64px; display:flex; justify-content:space-between; align-items:center; z-index:40; font-size:12px; letter-spacing:2px; }
#topbar span{ color:var(--muted); font-weight:700; }
#topbar.is-dark span{ color:#9db0c6; }

/* stage layout */
#stage{ position:fixed; inset:0; padding:96px 90px 120px 90px; z-index:10; perspective:1600px; }
.kicker{ font-weight:800; font-size:14px; letter-spacing:3.5px; text-transform:uppercase; color:var(--emerald2); margin-bottom:10px; view-transition-name:kicker; }
.is-dark .kicker{ color:var(--gold); }
h1.mtitle{ font-family:var(--display); font-weight:700; color:var(--navy); font-size:38px; line-height:1.15; margin:0 0 30px 0; letter-spacing:-.4px; view-transition-name:mainTitle; }
.is-dark h1.mtitle{ color:#fff; }
h1.mtitle.hero{ font-size:54px; }

/* card 3D system */
.card{ background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:0 16px 36px -22px rgba(14,32,56,.35); transition:box-shadow .2s ease; transform-style:preserve-3d; will-change:transform; }
.badge{ width:48px;height:48px;border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--emerald); color:#fff; flex:0 0 auto;
  box-shadow: inset 0 2px 3px rgba(255,255,255,.4), inset 0 -4px 6px rgba(0,0,0,.28), 0 3px 0 rgba(0,0,0,.18), 0 12px 20px -9px rgba(31,111,84,.6); }
.badge.navy{ background:var(--navy); box-shadow: inset 0 2px 3px rgba(255,255,255,.25), inset 0 -4px 6px rgba(0,0,0,.35), 0 3px 0 rgba(0,0,0,.3), 0 12px 20px -9px rgba(14,32,56,.7); }
.badge.gold{ background:var(--gold); box-shadow: inset 0 2px 3px rgba(255,255,255,.5), inset 0 -4px 6px rgba(0,0,0,.22), 0 3px 0 rgba(0,0,0,.16), 0 12px 20px -9px rgba(201,162,39,.6); }
.badge svg{ width:24px;height:24px; }
.num{ width:42px;height:42px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:18px;flex:0 0 auto;
  box-shadow: inset 0 2px 3px rgba(255,255,255,.25), inset 0 -4px 6px rgba(0,0,0,.35), 0 3px 0 rgba(0,0,0,.3), 0 10px 16px -8px rgba(14,32,56,.6); }

/* entrance stagger — replays every time a slide is shown */
.enter{ opacity:0; transform:translateY(18px) rotateX(6deg); animation:enterUp .65s cubic-bezier(.2,.7,.2,1) forwards; }
@keyframes enterUp{ to{ opacity:1; transform:translateY(0) rotateX(0);} }
.enter.n0{animation-delay:.05s;} .enter.n1{animation-delay:.16s;} .enter.n2{animation-delay:.27s;}
.enter.n3{animation-delay:.38s;} .enter.n4{animation-delay:.49s;} .enter.n5{animation-delay:.6s;}
.enter.n6{animation-delay:.71s;} .enter.n7{animation-delay:.82s;}

/* spine — persistent connective thread across all slides */
#spineWrap{ position:fixed; left:0; right:0; bottom:0; height:86px; z-index:40; display:flex; align-items:center; padding:0 90px; perspective:500px; }
#spineTrack{ position:relative; flex:1; height:2px; background:rgba(120,140,160,.35); border-radius:2px; transform:rotateX(42deg); transform-origin:center bottom; }
#spineFill{ position:absolute; left:0; top:0; height:100%; background:linear-gradient(90deg,var(--emerald),var(--gold)); border-radius:2px; view-transition-name:spineFill; }
.spineDot{ position:absolute; top:50%; width:9px; height:9px; border-radius:50%; background:#b9c6d1; transform:translate(-50%,-50%); transition:none; }
.spineDot.active{ width:15px; height:15px; background:var(--gold); box-shadow:0 0 0 5px rgba(201,162,39,.22); view-transition-name:spineActive; }
#spineLabel{ position:fixed; left:90px; bottom:30px; font-size:11px; color:var(--muted); letter-spacing:1px; z-index:41; view-transition-name:spineLabel; }
.is-dark ~ #spineLabel{ color:#9db0c6; }

/* nav hint */
#navHint{ position:fixed; right:90px; bottom:30px; font-size:11px; color:var(--muted); letter-spacing:.5px; z-index:41; }

/* quick-access drive link — persists on every slide */
#driveLink{ position:fixed; top:22px; left:50%; transform:translateX(-50%); z-index:55; display:flex; align-items:center; gap:7px;
  font-size:11px; font-weight:700; letter-spacing:.6px; color:var(--muted); text-decoration:none; background:rgba(255,255,255,.7);
  border:1px solid var(--line); padding:7px 14px 7px 10px; border-radius:999px; pointer-events:auto; backdrop-filter:blur(6px);
  transition:box-shadow .2s ease, transform .2s ease, background .2s ease; }
#driveLink svg{ width:14px;height:14px; flex:0 0 auto; }
#driveLink:hover{ box-shadow:0 8px 18px -8px rgba(14,32,56,.4); transform:translateX(-50%) translateY(-1px); }
.is-dark ~ #driveLink, #driveLink.is-dark{ background:rgba(255,255,255,.08); color:#dfe8f0; border-color:rgba(255,255,255,.18); }

/* notes overlay */
#notesPanel{ position:fixed; right:24px; bottom:96px; width:360px; max-height:220px; overflow:auto; background:rgba(14,32,56,.95); color:#fff; border-radius:14px; padding:16px 18px; font-size:13px; line-height:1.5; z-index:60; box-shadow:0 20px 40px rgba(0,0,0,.4); display:none; }
#notesPanel.show{ display:block; }
#notesPanel b{ color:var(--gold); }

.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:22px; }
.grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
.grid4{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }
.row{ display:flex; gap:14px; align-items:flex-start; }
.muted{ color:var(--muted); }
.cbody{ font-size:14px; color:var(--muted); line-height:1.5; margin:0; }
.ctitle{ font-family:var(--display); font-weight:700; font-size:17px; color:var(--navy); margin:0 0 6px 0; }

/* ---------------- Intro splash (opening animation) ---------------- */
#introOverlay{ position:fixed; inset:0; z-index:200; background:var(--navy); display:flex; align-items:center; justify-content:center; flex-direction:column; perspective:1400px; }
#introOverlay canvas{ position:absolute; inset:0; }
#introMark{ position:relative; z-index:2; text-align:center; opacity:0; transform:translateZ(-260px) rotateX(30deg) scale(.85); animation:introMarkIn 1.5s cubic-bezier(.16,.8,.2,1) .3s forwards; }
#introMark .il{ display:block; font-family:var(--display); font-weight:900; color:#fff; font-size:15px; letter-spacing:9px; text-transform:uppercase; margin-bottom:18px; opacity:0; animation:introFade .8s ease forwards 1.05s; color:var(--gold); }
#introMark h2{ font-family:var(--display); font-weight:700; font-size:40px; color:#fff; margin:0; line-height:1.25; max-width:760px; }
#introMark .iw{ display:inline-block; opacity:0; filter:blur(6px); transform:translateY(14px); animation:introWord .7s cubic-bezier(.2,.7,.2,1) forwards; }
#introMark .sub{ margin-top:22px; font-size:13px; letter-spacing:2px; color:#9db0c6; opacity:0; animation:introFade .8s ease forwards 1.9s; }
@keyframes introMarkIn{ to{ opacity:1; transform:translateZ(0) rotateX(0) scale(1);} }
@keyframes introFade{ to{ opacity:1; } }
@keyframes introWord{ to{ opacity:1; filter:blur(0); transform:translateY(0);} }
#introOverlay.leaving{ animation:introOut .8s cubic-bezier(.4,0,.7,.2) forwards; pointer-events:none; }
@keyframes introOut{ to{ opacity:0; transform:scale(1.06); } }
#introRing{ position:absolute; width:640px; height:640px; border-radius:50%; border:1px solid rgba(255,255,255,.08); z-index:1; animation:ringSpin 40s linear infinite; }
#introRing::before{ content:''; position:absolute; inset:60px; border-radius:50%; border:1px solid rgba(201,162,39,.14); }
@keyframes ringSpin{ to{ transform:rotate(360deg); } }
#skipIntro{ position:absolute; bottom:36px; right:46px; z-index:3; font-size:11px; letter-spacing:1.5px; color:#9db0c6; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); padding:8px 16px; border-radius:999px; cursor:pointer; opacity:0; animation:introFade .8s ease forwards 2.2s; }
</style>
</head>

// ---------------- Ambient 3D particle network (represents the digital social network) ----------------
const netCanvas = document.getElementById('netCanvas');
const nctx = netCanvas.getContext('2d');
function resizeNet(){ netCanvas.width = innerWidth; netCanvas.height = innerHeight; }
resizeNet(); window.addEventListener('resize', resizeNet);
const nodes = Array.from({length:42}, ()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight, z:Math.random(),
  vx:(Math.random()-.5)*0.22, vy:(Math.random()-.5)*0.22
}));
let netRGB = '31,111,84';
function tickNet(){
  nctx.clearRect(0,0,netCanvas.width,netCanvas.height);
  nodes.forEach(n=>{
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0||n.x>netCanvas.width) n.vx*=-1;
    if(n.y<0||n.y>netCanvas.height) n.vy*=-1;
  });
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i], b=nodes[j];
      const d = Math.hypot(a.x-b.x, a.y-b.y);
      if(d<145){
        nctx.strokeStyle = `rgba(${netRGB},${(1-d/145)*0.16})`;
        nctx.lineWidth = 1;
        nctx.beginPath(); nctx.moveTo(a.x,a.y); nctx.lineTo(b.x,b.y); nctx.stroke();
      }
    }
  }
  nodes.forEach(n=>{
    const r = 1.3 + n.z*2.6;
    nctx.beginPath();
    nctx.fillStyle = `rgba(${netRGB},${0.22+n.z*0.5})`;
    nctx.arc(n.x, n.y, r, 0, Math.PI*2);
    nctx.fill();
  });
  requestAnimationFrame(tickNet);
}
tickNet();

// ---------------- 3D pointer tilt for cards ----------------
function attachTilt(){
  document.querySelectorAll('.stagebody .card, #stage .card').forEach(card=>{
    card.addEventListener('pointermove', (e)=>{
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left)/r.width - .5;
      const py = (e.clientY - r.top)/r.height - .5;
      card.style.transform = `perspective(700px) rotateX(${(-py*7).toFixed(2)}deg) rotateY(${(px*9).toFixed(2)}deg) translateY(-3px)`;
      card.style.boxShadow = '0 26px 46px -20px rgba(14,32,56,.45)';
    });
    card.addEventListener('pointerleave', ()=>{
      card.style.transform = '';
      card.style.boxShadow = '';
    });
  });
}


let idx = 0;
const total = S.length;
const app = document.getElementById('app');
const bgBase = document.getElementById('bgBase');
const stage = document.getElementById('stage');
const spineTrack = document.getElementById('spineTrack');
const spineLabel = document.getElementById('spineLabel');
const secLabel = document.getElementById('secLabel');
const topbar = document.getElementById('topbar');
const pageLabel = document.getElementById('pageLabel');
const progressFill = document.getElementById('progressFill');
const notesPanel = document.getElementById('notesPanel');
const orbA = document.getElementById('orbA');
const orbB = document.getElementById('orbB');
const driveLink = document.getElementById('driveLink');

// build spine dots once
S.forEach((s,i)=>{
  const dot = document.createElement('div');
  dot.className = 'spineDot';
  dot.style.left = (i/(total-1)*100) + '%';
  dot.dataset.i = i;
  spineTrack.appendChild(dot);
});

const orbPalettes = [
  ['rgba(44,138,107,.35)','rgba(201,162,39,.22)'],
  ['rgba(31,111,84,.28)','rgba(14,32,56,.12)'],
  ['rgba(201,162,39,.24)','rgba(44,138,107,.22)'],
];

function renderStatic(i){
  const s = S[i];
  app.classList.toggle('is-dark', !!s.dark);
  bgBase.classList.toggle('is-dark', !!s.dark);
  topbar.classList.toggle('is-dark', !!s.dark);
  driveLink.classList.toggle('is-dark', !!s.dark);
  const pal = orbPalettes[i % orbPalettes.length];
  orbA.style.cssText += `width:520px;height:520px;background:radial-gradient(circle,${pal[0]},transparent 70%);top:${s.dark? -180:-160}px;right:${i%2? -140:-180}px;`;
  orbB.style.cssText += `width:340px;height:340px;background:radial-gradient(circle,${pal[1]},transparent 70%);bottom:${-120-(i%3)*20}px;left:${-100-(i%2)*40}px;`;

  const bgHtml = s.bibliography
    ? `<div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;opacity:.14;font-size:10.5px;line-height:1.9;color:#fff;columns:2;column-gap:36px;padding:70px 0 0 0;">
        <div style="font-family:'Fraunces',serif;font-weight:700;font-size:13px;margin-bottom:6px;letter-spacing:2px;">DAFTAR PUSTAKA</div>
        ${DAFTAR_PUSTAKA.map(r=>`<div style="break-inside:avoid;margin-bottom:8px;">${r}</div>`).join('')}
      </div>`
    : '';

  stage.innerHTML = `
    ${bgHtml}
    <div style="position:relative;z-index:1;">
      <div class="kicker">${s.kicker}</div>
      <h1 class="mtitle ${s.hero? 'hero':''}">${s.title}</h1>
      <div class="stagebody">${s.body()}</div>
    </div>
  `;
  netRGB = s.dark ? '201,162,39' : '31,111,84';
  attachTilt();
  secLabel.textContent = s.spine.toUpperCase();
  pageLabel.textContent = String(i+1).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
  progressFill.style.width = (i/(total-1)*100) + '%';
  spineLabel.textContent = s.spine.toUpperCase() + '  ·  ' + (i+1) + '/' + total;
  document.querySelectorAll('.spineDot').forEach((d,di)=>{
    d.classList.toggle('active', di===i);
  });
  notesPanel.innerHTML = '<b>Catatan:</b> ' + s.notes;
}

function goTo(i){
  i = Math.max(0, Math.min(total-1, i));
  if(i===idx) return;
  const forward = i > idx;
  idx = i;
  document.documentElement.classList.remove('dir-fwd','dir-back');
  document.documentElement.classList.add(forward ? 'dir-fwd' : 'dir-back');
  if(document.startViewTransition){
    const t = document.startViewTransition(()=>renderStatic(idx));
    t.finished.finally(()=>{ document.documentElement.classList.remove('dir-fwd','dir-back'); });
  } else {
    renderStatic(idx);
  }
}

renderStatic(0);

document.addEventListener('keydown', (e)=>{
  if(e.key==='ArrowRight' || e.key===' ' || e.key==='PageDown'){ e.preventDefault(); goTo(idx+1); }
  else if(e.key==='ArrowLeft' || e.key==='PageUp'){ e.preventDefault(); goTo(idx-1); }
  else if(e.key.toLowerCase()==='n'){ notesPanel.classList.toggle('show'); }
  else if(e.key.toLowerCase()==='f'){ document.documentElement.requestFullscreen?.(); }
  else if(e.key==='Home'){ goTo(0); }
  else if(e.key==='End'){ goTo(total-1); }
});
document.addEventListener('click', (e)=>{
  if(e.target.closest('#notesPanel')) return;
  if(e.target.closest('#driveLink')) return;
  if(e.target.closest('#introOverlay')) return;
  const x = e.clientX / window.innerWidth;
  if(x < 0.35) goTo(idx-1); else if(x > 0.65) goTo(idx+1);
});
document.querySelectorAll('.spineDot').forEach(d=>{
  d.style.cursor='pointer'; d.style.pointerEvents='auto';
  d.addEventListener('click', (e)=>{ e.stopPropagation(); goTo(parseInt(d.dataset.i)); });
});

// ---------------- Intro splash: converging particle network forming into the title ----------------
(function(){
  const introWordsEl = document.getElementById('introWords');
  const words = "Pesan Damai dalam Meme Perayaan Ritual Keagamaan di Kalimantan Barat".split(' ');
  introWordsEl.innerHTML = words.map((w,i)=>`<span class="iw" style="animation-delay:${1.15 + i*0.055}s">${w}</span>`).join(' ');

  const c = document.getElementById('introCanvas');
  const ctx = c.getContext('2d');
  function resize(){ c.width = innerWidth; c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const cx = ()=> innerWidth/2, cy = ()=> innerHeight/2;
  const P = Array.from({length:120}, ()=>({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    tx: 0, ty: 0, r: Math.random()*1.8+0.6
  }));
  P.forEach((p,i)=>{
    const ang = (i/P.length) * Math.PI*2;
    const rad = 40 + Math.random()*220;
    p.tx = cx() + Math.cos(ang)*rad;
    p.ty = cy() + Math.sin(ang)*rad*0.55;
  });
  let t0 = performance.now();
  function frame(now){
    const t = Math.min(1, (now - t0)/2200);
    const ease = 1 - Math.pow(1-t, 3);
    ctx.clearRect(0,0,c.width,c.height);
    P.forEach(p=>{
      const x = p.x + (p.tx - p.x)*ease;
      const y = p.y + (p.ty - p.y)*ease;
      ctx.beginPath();
      ctx.fillStyle = `rgba(201,162,39,${0.15+ease*0.5})`;
      ctx.arc(x,y,p.r,0,Math.PI*2);
      ctx.fill();
    });
    for(let i=0;i<P.length;i++){
      for(let j=i+1;j<P.length;j++){
        const a=P[i], b=P[j];
        const ax=a.x+(a.tx-a.x)*ease, ay=a.y+(a.ty-a.y)*ease;
        const bx=b.x+(b.tx-b.x)*ease, by=b.y+(b.ty-b.y)*ease;
        const d = Math.hypot(ax-bx, ay-by);
        if(d<70){
          ctx.strokeStyle = `rgba(255,255,255,${(1-d/70)*0.1*ease})`;
          ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
        }
      }
    }
    if(t < 1 || !introDone){ requestAnimationFrame(frame); }
  }
  let introDone = false;
  requestAnimationFrame(frame);

  function leaveIntro(){
    if(introDone) return;
    introDone = true;
    const ov = document.getElementById('introOverlay');
    ov.classList.add('leaving');
    setTimeout(()=>{ ov.remove(); }, 850);
  }
  document.getElementById('skipIntro').addEventListener('click', (e)=>{ e.stopPropagation(); leaveIntro(); });
  document.getElementById('introOverlay').addEventListener('click', leaveIntro);
  document.addEventListener('keydown', function once(e){
    if(['Enter',' ','ArrowRight'].includes(e.key)){ leaveIntro(); }
  });
  setTimeout(leaveIntro, 5200);
})();
</script>
