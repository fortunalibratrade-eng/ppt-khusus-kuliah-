<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sidang Proposal — Zainal Parhan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0e2038; --navy2:#122a4a; --emerald:#1f6f54; --emerald2:#2c8a6b;
  --gold:#c9a227; --ivory:#f7f8f6; --ink:#12181f; --muted:#5b6b7c;
  --card:#ffffff; --line:#e4e8e6; --display:'Fraunces',serif; --body:'Inter',sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--body); color:var(--ink); background:#000; overflow:hidden;}

::view-transition{ perspective:1900px; }
::view-transition-group(*){ animation-duration:.7s; animation-timing-function:cubic-bezier(.2,.7,.2,1); }
::view-transition-old(mainTitle), ::view-transition-new(mainTitle){ height:100%; }

html.dir-fwd::view-transition-old(root){ animation: flyOutFwd .55s cubic-bezier(.4,0,.7,.2) both; }
html.dir-fwd::view-transition-new(root){ animation: flyInFwd .75s cubic-bezier(.16,.8,.2,1) both; }
html.dir-back::view-transition-old(root){ animation: flyOutBack .55s cubic-bezier(.4,0,.7,.2) both; }
html.dir-back::view-transition-new(root){ animation: flyInBack .75s cubic-bezier(.16,.8,.2,1) both; }
@keyframes flyOutFwd{ to{ transform:translateZ(-720px) rotateY(-20deg) rotateX(4deg) translateX(-70px); opacity:0; } }
@keyframes flyInFwd{ from{ transform:translateZ(760px) rotateY(22deg) rotateX(-5deg) translateX(90px); opacity:0;} to{ transform:none; opacity:1;} }
@keyframes flyOutBack{ to{ transform:translateZ(-720px) rotateY(20deg) rotateX(4deg) translateX(70px); opacity:0; } }
@keyframes flyInBack{ from{ transform:translateZ(760px) rotateY(-22deg) rotateX(-5deg) translateX(-90px); opacity:0;} to{ transform:none; opacity:1;} }

#netCanvas{ position:fixed; inset:0; z-index:3; pointer-events:none; }
#bgBase{ position:fixed; inset:0; background:var(--ivory); z-index:0; }
#bgBase.is-dark{ background:var(--navy); }
#app{ position:fixed; inset:0; background:transparent; z-index:10; }

.orb{ position:fixed; border-radius:50%; filter:blur(4px); pointer-events:none; transition:none; z-index:1; }
#orbA{ view-transition-name: orbA; }
#orbB{ view-transition-name: orbB; }
@keyframes driftA{ 0%,100%{ transform:translate(0,0) rotate(0deg);} 50%{ transform:translate(18px,-24px) rotate(8deg);} }
@keyframes driftB{ 0%,100%{ transform:translate(0,0) rotate(0deg);} 50%{ transform:translate(-20px,22px) rotate(-8deg);} }
#orbA{ animation:driftA 10s ease-in-out infinite; }
#orbB{ animation:driftB 12s ease-in-out infinite; }

#progressTrack{ position:fixed; top:0; left:0; right:0; height:4px; background:rgba(120,140,160,.18); z-index:50; }
#progressFill{ height:100%; background:linear-gradient(90deg,var(--emerald),var(--gold)); view-transition-name:progressFill; }

#topbar{ position:fixed; top:22px; left:64px; right:64px; display:flex; justify-content:space-between; align-items:center; z-index:40; font-size:14.5px; letter-spacing:2px; }
#topbar span{ color:var(--muted); font-weight:700; }
#topbar.is-dark span{ color:#9db0c6; }

#stage{ position:fixed; inset:0; padding:86px 78px 128px 78px; z-index:10; perspective:1800px; }
.kicker{ font-weight:800; font-size:16.5px; letter-spacing:3.2px; text-transform:uppercase; color:var(--emerald2); margin-bottom:8px; view-transition-name:kicker; }
.is-dark .kicker{ color:var(--gold); }
h1.mtitle{ font-family:var(--display); font-weight:700; color:var(--navy); font-size:40.5px; line-height:1.15; margin:0 0 20px 0; letter-spacing:-.4px; view-transition-name:mainTitle; }
.is-dark h1.mtitle{ color:#fff; }
h1.mtitle.hero{ font-size:66px; margin-bottom:30px; }

.card{ background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 16px 36px -22px rgba(14,32,56,.35); transition:box-shadow .2s ease; transform-style:preserve-3d; will-change:transform; }
.badge{ width:50px;height:50px;border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--emerald); color:#fff; flex:0 0 auto;
  box-shadow: inset 0 2px 3px rgba(255,255,255,.4), inset 0 -4px 6px rgba(0,0,0,.28), 0 3px 0 rgba(0,0,0,.18), 0 12px 20px -9px rgba(31,111,84,.6); }
.badge.navy{ background:var(--navy); box-shadow: inset 0 2px 3px rgba(255,255,255,.25), inset 0 -4px 6px rgba(0,0,0,.35), 0 3px 0 rgba(0,0,0,.3), 0 12px 20px -9px rgba(14,32,56,.7); }
.badge.gold{ background:var(--gold); box-shadow: inset 0 2px 3px rgba(255,255,255,.5), inset 0 -4px 6px rgba(0,0,0,.22), 0 3px 0 rgba(0,0,0,.16), 0 12px 20px -9px rgba(201,162,39,.6); }
.badge svg{ width:25px;height:25px; }
.num{ width:43px;height:43px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:19.5px;flex:0 0 auto;
  box-shadow: inset 0 2px 3px rgba(255,255,255,.25), inset 0 -4px 6px rgba(0,0,0,.35), 0 3px 0 rgba(0,0,0,.3), 0 10px 16px -8px rgba(14,32,56,.6); }

.enter{ opacity:0; transform:translateY(16px) rotateX(6deg); animation:enterUp .65s cubic-bezier(.2,.7,.2,1) forwards; }
@keyframes enterUp{ to{ opacity:1; transform:translateY(0) rotateX(0);} }
.enter.n0{animation-delay:.05s;} .enter.n1{animation-delay:.14s;} .enter.n2{animation-delay:.23s;}
.enter.n3{animation-delay:.32s;} .enter.n4{animation-delay:.41s;} .enter.n5{animation-delay:.5s;}
.enter.n6{animation-delay:.59s;} .enter.n7{animation-delay:.68s;}

#spineWrap{ position:fixed; left:0; right:0; bottom:0; height:80px; z-index:40; display:flex; align-items:center; padding:0 84px; perspective:500px; }
#spineTrack{ position:relative; flex:1; height:2px; background:rgba(120,140,160,.35); border-radius:2px; transform:rotateX(42deg); transform-origin:center bottom; }
#spineFill{ position:absolute; left:0; top:0; height:100%; background:linear-gradient(90deg,var(--emerald),var(--gold)); border-radius:2px; view-transition-name:spineFill; }
.spineDot{ position:absolute; top:50%; width:9px; height:9px; border-radius:50%; background:#b9c6d1; transform:translate(-50%,-50%); transition:none; }
.spineDot.active{ width:15px; height:15px; background:var(--gold); box-shadow:0 0 0 5px rgba(201,162,39,.22); view-transition-name:spineActive; }
#spineLabel{ position:fixed; left:84px; bottom:28px; font-size:13.5px; color:var(--muted); letter-spacing:1px; z-index:41; view-transition-name:spineLabel; }
.is-dark ~ #spineLabel{ color:#9db0c6; }

#navHint{ position:fixed; right:84px; bottom:28px; font-size:13.5px; color:var(--muted); letter-spacing:.5px; z-index:41; }

#driveLink{ position:fixed; top:22px; left:50%; transform:translateX(-50%); z-index:55; display:flex; align-items:center; gap:8px;
  font-size:13.5px; font-weight:700; letter-spacing:.6px; color:var(--muted); text-decoration:none; background:rgba(255,255,255,.7);
  border:1px solid var(--line); padding:8px 15px 7px 10px; border-radius:999px; pointer-events:auto; backdrop-filter:blur(6px);
  transition:box-shadow .2s ease, transform .2s ease, background .2s ease; }
#driveLink svg{ width:16px;height:16px; flex:0 0 auto; }
#driveLink:hover{ box-shadow:0 8px 18px -8px rgba(14,32,56,.4); transform:translateX(-50%) translateY(-1px); }
.is-dark ~ #driveLink, #driveLink.is-dark{ background:rgba(255,255,255,.08); color:#dfe8f0; border-color:rgba(255,255,255,.18); }

#notesPanel{ position:fixed; right:24px; bottom:92px; width:380px; max-height:260px; overflow:auto; background:rgba(14,32,56,.95); color:#fff; border-radius:14px; padding:18px 20px; font-size:16px; line-height:1.55; z-index:60; box-shadow:0 20px 40px rgba(0,0,0,.4); display:none; }
#notesPanel.show{ display:block; }
#notesPanel b{ color:var(--gold); }

.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:22px; }
.grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
.grid4{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }
.row{ display:flex; gap:16px; align-items:flex-start; }
.muted{ color:var(--muted); }
.cbody{ font-size:16px; color:var(--muted); line-height:1.55; margin:0; }
.ctitle{ font-family:var(--display); font-weight:700; font-size:19.5px; color:var(--navy); margin:0 0 6px 0; }

#introOverlay{ position:fixed; inset:0; z-index:200; background:radial-gradient(ellipse at 50% 42%, #16324f 0%, var(--navy) 55%, #060e1a 100%); display:flex; align-items:center; justify-content:center; flex-direction:column; perspective:2200px; overflow:hidden; }
#introOverlay canvas{ position:absolute; inset:0; }
#introGlow{ position:absolute; width:1100px; height:1100px; border-radius:50%; z-index:1; pointer-events:none;
  background:radial-gradient(circle, rgba(201,162,39,.20) 0%, rgba(31,111,84,.12) 38%, transparent 70%);
  filter:blur(6px); opacity:0; animation:glowIn 2.4s ease forwards .1s, glowPulse 6s ease-in-out infinite 2.4s; }
@keyframes glowIn{ to{ opacity:1; } }
@keyframes glowPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }
#introMark{ position:relative; z-index:2; text-align:center; opacity:0; transform:translateZ(-420px) rotateX(38deg) rotateY(-6deg) scale(.8); animation:introMarkIn 1.7s cubic-bezier(.16,.8,.2,1) .35s forwards; transform-style:preserve-3d; }
#introMark .il{ display:block; font-family:var(--display); font-weight:900; letter-spacing:10px; text-transform:uppercase; margin-bottom:20px; opacity:0; animation:introFade .9s ease forwards 1.15s; color:var(--gold); font-size:18.5px;
  text-shadow:0 0 18px rgba(201,162,39,.5); }
#introMark h2{ font-family:var(--display); font-weight:700; font-size:58px; color:#fff; margin:0; line-height:1.24; max-width:940px;
  text-shadow: 0 1px 0 rgba(255,255,255,.25), 0 2px 0 rgba(0,0,0,.15), 0 4px 2px rgba(0,0,0,.18), 0 12px 20px rgba(0,0,0,.35), 0 24px 50px rgba(0,0,0,.4); }
#introMark .iw{ display:inline-block; opacity:0; filter:blur(10px); transform:translateY(26px) rotateX(-55deg) translateZ(-40px); transform-origin:bottom center; animation:introWord .85s cubic-bezier(.16,.8,.2,1) forwards; }
#introMark .sub{ margin-top:28px; font-size:16px; letter-spacing:2.5px; color:#9db0c6; opacity:0; animation:introFade .9s ease forwards 2.35s; position:relative; display:inline-block; }
#introMark .sub::before,#introMark .sub::after{ content:''; position:absolute; top:50%; width:34px; height:1px; background:linear-gradient(90deg,transparent,rgba(201,162,39,.7)); }
#introMark .sub::before{ right:calc(100% + 16px); }
#introMark .sub::after{ left:calc(100% + 16px); transform:scaleX(-1); }
@keyframes introMarkIn{ to{ opacity:1; transform:translateZ(0) rotateX(0) rotateY(0) scale(1);} }
@keyframes introFade{ to{ opacity:1; } }
@keyframes introWord{ to{ opacity:1; filter:blur(0); transform:translateY(0) rotateX(0) translateZ(0);} }
#introOverlay.leaving{ animation:introOut .9s cubic-bezier(.6,0,.8,.2) forwards; pointer-events:none; }
@keyframes introOut{
  0%{ opacity:1; transform:scale(1) translateZ(0); filter:blur(0); }
  60%{ opacity:.9; transform:scale(1.16) translateZ(220px); filter:blur(2px); }
  100%{ opacity:0; transform:scale(1.7) translateZ(900px); filter:blur(14px); }
}
.introRing{ position:absolute; border-radius:50%; z-index:1; border:1px solid rgba(255,255,255,.08); transform-style:preserve-3d; }
#ringA{ width:560px; height:560px; border-color:rgba(255,255,255,.09); animation:ringSpinA 34s linear infinite; }
#ringB{ width:760px; height:760px; border-color:rgba(201,162,39,.15); animation:ringSpinB 46s linear infinite reverse; }
#ringC{ width:960px; height:960px; border-color:rgba(44,138,107,.13); animation:ringSpinC 60s linear infinite; }
#ringA::before,#ringB::before,#ringC::before{ content:''; position:absolute; width:8px; height:8px; border-radius:50%; background:var(--gold); top:-4px; left:50%; margin-left:-4px; box-shadow:0 0 14px 3px rgba(201,162,39,.7); }
#ringB::before{ background:var(--emerald2); box-shadow:0 0 14px 3px rgba(44,138,107,.65); }
#ringC::before{ background:#fff; opacity:.5; box-shadow:0 0 10px 3px rgba(255,255,255,.4); }
@keyframes ringSpinA{ to{ transform:rotateZ(360deg) rotateX(62deg); } }
@keyframes ringSpinB{ to{ transform:rotateZ(360deg) rotateX(68deg) rotateY(8deg); } }
@keyframes ringSpinC{ to{ transform:rotateZ(360deg) rotateX(72deg) rotateY(-6deg); } }
#introBadge{ position:relative; z-index:2; width:88px; height:88px; margin:0 auto 34px auto; border-radius:50%;
  background:linear-gradient(155deg,var(--emerald),var(--emerald2)); display:flex; align-items:center; justify-content:center;
  box-shadow: inset 0 3px 4px rgba(255,255,255,.45), inset 0 -6px 10px rgba(0,0,0,.3), 0 4px 0 rgba(0,0,0,.2), 0 22px 40px -12px rgba(31,111,84,.7), 0 0 0 8px rgba(255,255,255,.05);
  opacity:0; transform:translateZ(-180px) rotateY(180deg) scale(.6); animation:badgeIn 1.3s cubic-bezier(.2,.8,.2,1) .05s forwards; }
#introBadge svg{ width:38px; height:38px; color:#fff; filter:drop-shadow(0 3px 4px rgba(0,0,0,.25)); }
@keyframes badgeIn{ to{ opacity:1; transform:translateZ(0) rotateY(0) scale(1); } }
#skipIntro{ position:absolute; bottom:40px; right:50px; z-index:3; font-size:13.5px; letter-spacing:1.5px; color:#9db0c6; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.18); padding:11px 22px; border-radius:999px; cursor:pointer; opacity:0; animation:introFade .8s ease forwards 2.5s; transition:background .2s ease, color .2s ease, transform .2s ease; backdrop-filter:blur(4px); }
#skipIntro:hover{ background:rgba(201,162,39,.16); color:#fff; transform:translateY(-1px); }
#introHairline{ position:absolute; left:50%; bottom:66px; width:1px; height:0; background:linear-gradient(180deg,transparent,rgba(201,162,39,.6)); z-index:2; animation:hairlineGrow 1.4s ease forwards 2.6s; }
@keyframes hairlineGrow{ to{ height:46px; } }
</style>
</head>

const netCanvas = document.getElementById('netCanvas');
const nctx = netCanvas.getContext('2d');
function resizeNet(){ netCanvas.width = innerWidth; netCanvas.height = innerHeight; }
resizeNet(); window.addEventListener('resize', resizeNet);
const nodes = Array.from({length:42}, ()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight, z:Math.random(),
  vx:(Math.random()-.5)*0.22, vy:(Math.random()-.5)*0.22
}));
let netRGB = '31,111,84';
function tickNet(){
  nctx.clearRect(0,0,netCanvas.width,netCanvas.height);
  nodes.forEach(n=>{
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0||n.x>netCanvas.width) n.vx*=-1;
    if(n.y<0||n.y>netCanvas.height) n.vy*=-1;
  });
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i], b=nodes[j];
      const d = Math.hypot(a.x-b.x, a.y-b.y);
      if(d<145){
        nctx.strokeStyle = `rgba(${netRGB},${(1-d/145)*0.16})`;
        nctx.lineWidth = 1;
        nctx.beginPath(); nctx.moveTo(a.x,a.y); nctx.lineTo(b.x,b.y); nctx.stroke();
      }
    }
  }
  nodes.forEach(n=>{
    const r = 1.3 + n.z*2.6;
    nctx.beginPath();
    nctx.fillStyle = `rgba(${netRGB},${0.22+n.z*0.5})`;
    nctx.arc(n.x, n.y, r, 0, Math.PI*2);
    nctx.fill();
  });
  requestAnimationFrame(tickNet);
}
tickNet();

function attachTilt(){
  document.querySelectorAll('#stage .card').forEach(card=>{
    card.style.transition = 'transform .12s ease-out, box-shadow .18s ease-out';
    card.addEventListener('pointermove', (e)=>{
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left)/r.width - .5;
      const py = (e.clientY - r.top)/r.height - .5;
      card.style.transform = `perspective(900px) rotateX(${(-py*11).toFixed(2)}deg) rotateY(${(px*14).toFixed(2)}deg) translateY(-7px) translateZ(18px) scale(1.015)`;
      card.style.boxShadow = `${(-px*22).toFixed(0)}px 34px 54px -20px rgba(14,32,56,.5), 0 0 0 1px rgba(201,162,39,.08)`;
    });
    card.addEventListener('pointerleave', ()=>{
      card.style.transform = '';
      card.style.boxShadow = '';
    });
  });
}

function goTo(i){
  i = Math.max(0, Math.min(total-1, i));
  if(i===idx) return;
  const forward = i > idx;
  idx = i;
  document.documentElement.classList.remove('dir-fwd','dir-back');
  document.documentElement.classList.add(forward ? 'dir-fwd' : 'dir-back');
  if(document.startViewTransition){
    const t = document.startViewTransition(()=>renderStatic(idx));
    t.finished.finally(()=>{ document.documentElement.classList.remove('dir-fwd','dir-back'); });
  } else {
    renderStatic(idx);
  }
}

renderStatic(0);

document.addEventListener('keydown', (e)=>{
  if(e.key==='ArrowRight' || e.key===' ' || e.key==='PageDown'){ e.preventDefault(); goTo(idx+1); }
  else if(e.key==='ArrowLeft' || e.key==='PageUp'){ e.preventDefault(); goTo(idx-1); }
  else if(e.key.toLowerCase()==='n'){ notesPanel.classList.toggle('show'); }
  else if(e.key.toLowerCase()==='f'){ document.documentElement.requestFullscreen?.(); }
  else if(e.key==='Home'){ goTo(0); }
  else if(e.key==='End'){ goTo(total-1); }
});
document.addEventListener('click', (e)=>{
  if(e.target.closest('#notesPanel')) return;
  if(e.target.closest('#driveLink')) return;
  if(e.target.closest('#introOverlay')) return;
  const x = e.clientX / window.innerWidth;
  if(x < 0.35) goTo(idx-1); else if(x > 0.65) goTo(idx+1);
});
document.querySelectorAll('.spineDot').forEach(d=>{
  d.style.cursor='pointer'; d.style.pointerEvents='auto';
  d.addEventListener('click', (e)=>{ e.stopPropagation(); goTo(parseInt(d.dataset.i)); });
});

(function(){
  const introWordsEl = document.getElementById('introWords');
  const words = "Pesan Damai dalam Meme Perayaan Ritual Keagamaan di Kalimantan Barat".split(' ');
  introWordsEl.innerHTML = words.map((w,i)=>`<span class="iw" style="animation-delay:${1.45 + i*0.058}s">${w}</span>`).join(' ');

  const c = document.getElementById('introCanvas');
  const ctx = c.getContext('2d');
  function resize(){ c.width = innerWidth; c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const cx = ()=> innerWidth/2, cy = ()=> innerHeight/2;

  // Partikel 3D semu: setiap partikel punya sudut orbit, radius, dan kemiringan "z" (depth)
  // sehingga formasinya membentuk cincin/torus yang berputar perlahan, bukan lingkaran datar.
  const COUNT = 220;
  const palette = ['201,162,39', '44,138,107', '255,255,255'];
  const P = Array.from({length:COUNT}, (_,i)=>{
    const ang0 = Math.random()*Math.PI*2;
    const radTarget = 210 + Math.random()*340;
    return {
      x: cx() + (Math.random()-.5)*innerWidth*1.4,
      y: cy() + (Math.random()-.5)*innerHeight*1.4,
      ang: ang0,
      angSpeed: (Math.random()<.5?-1:1) * (0.06 + Math.random()*0.10),
      radTarget,
      tilt: Math.random()*Math.PI*2,
      tiltRatio: 0.32 + Math.random()*0.22,
      z: Math.random(),
      r: Math.random()*2.1+0.7,
      c: palette[i % palette.length],
      wobble: Math.random()*Math.PI*2
    };
  });

  let t0 = performance.now();
  let introDone = false;
  let leaveT0 = null;

  function frame(now){
    const t = Math.min(1, (now - t0)/2600);
    const ease = 1 - Math.pow(1-t, 3);
    const spin = (now - t0)/1000;
    ctx.clearRect(0,0,c.width,c.height);

    // urutkan berdasar kedalaman semu supaya partikel "depan" digambar belakangan (layering 3D)
    const drawList = P.map(p=>{
      const ang = p.ang + p.angSpeed*spin*ease;
      const rad = p.radTarget*ease + (1-ease)*0; 
      const wob = Math.sin(spin*0.6 + p.wobble)*10*ease;
      const ex = Math.cos(ang)*(rad+wob);
      const ey = Math.sin(ang)*(rad+wob)*p.tiltRatio;
      const depth = Math.sin(ang)*0.5+0.55; // 0..1 semu kedalaman
      let x = p.x + (cx()+ex - p.x)*ease;
      let y = p.y + (cy()+ey - p.y)*ease;
      if(leaveT0!==null){
        const lt = Math.min(1,(now-leaveT0)/900);
        const burst = lt*lt*900;
        x += Math.cos(ang)*burst;
        y += Math.sin(ang)*burst*0.6;
      }
      return {x,y,depth,p};
    }).sort((a,b)=>a.depth-b.depth);

    drawList.forEach(({x,y,depth,p})=>{
      const rr = p.r * (0.55+depth*0.9);
      const alpha = (0.12+ease*0.55) * (0.4+depth*0.7) * (leaveT0!==null? Math.max(0,1-(now-leaveT0)/900):1);
      ctx.beginPath();
      ctx.fillStyle = `rgba(${p.c},${alpha.toFixed(3)})`;
      ctx.arc(x,y,rr,0,Math.PI*2);
      ctx.fill();
    });

    // benang penghubung tipis antar partikel yang berdekatan, kesan jejaring 3D
    for(let i=0;i<drawList.length;i+=1){
      const a = drawList[i];
      const b = drawList[(i+7)%drawList.length];
      const d = Math.hypot(a.x-b.x, a.y-b.y);
      if(d<95){
        ctx.strokeStyle = `rgba(255,255,255,${(1-d/95)*0.07*ease})`;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
    }

    if(leaveT0!==null && (now-leaveT0)>900){ return; }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function leaveIntro(){
    if(introDone) return;
    introDone = true;
    leaveT0 = performance.now();
    const ov = document.getElementById('introOverlay');
    ov.classList.add('leaving');
    setTimeout(()=>{ ov.remove(); }, 950);
  }
  document.getElementById('skipIntro').addEventListener('click', (e)=>{ e.stopPropagation(); leaveIntro(); });
  document.getElementById('introOverlay').addEventListener('click', leaveIntro);
  document.addEventListener('keydown', function once(e){
    if(['Enter',' ','ArrowRight'].includes(e.key)){ leaveIntro(); }
  });
  setTimeout(leaveIntro, 5800);
})();
</script>
